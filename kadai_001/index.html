<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>CANON COPY</title>
        <meta name="description" content="架空のcanonページを模写したものです。">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans&family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <header>
            <div class="header-inner">
                <h1>MyProfile</h1>

             <nav>
                <ul>
                <li><a href="#about">About</a></li>
                <li><a href="#works">Works</a></li>
                </ul>
             </nav>
            </div>
        </header>

        <main>
            <img class="main-img" src="images/main.png" alt="メイン写真">
            
            <article>
                <section>
                    <div id="about">
                        <h1>About</h1>
                     <div class="about-content">
                        <img class="about-img" src="images/about.png" alt="製作者写真">
                        <div class="description">
                        <h2 >Kazuki Asahina</h2>
                        <ul>
                            <li>25歳 長野県佐久市出身</li>
                            <li>ソフトウェア業界でマーケティングに従事</li>
                            <li>趣味はカメラ、愛機はCanon</li>
                            <li>自然を撮影するのが好きで、海や山によく行く</li>
                        </ul>
                        </div>
                     </div>
                    </div>
                </section>

                <section>
                    <div id="works">
                        <h1>Works</h1>
                        <div class="works-content">
                            <div class="works1">
                            <img src="images/works1.png">
                            <p>新潟に訪れた際に、日本海の雄大さに<br>魅了されて撮影した1枚</p>
                            </div>
                            <div class="works2">
                            <img src="images/works2.png">
                            <p>地元長野の木曽町から撮影した、<br>冠雪した御嶽山</p>
                            </div>
                            <div class="works3">
                            <img src="images/works3.png">
                            <p>京都で撮影した、<br>明け方の古き良き日本の町並み</p>
                            </div>
                        </div>
                    </div>
                </section>
            </article>
        </main>

        <footer>
            <p>&copy;MyProfile. All right reserved.</p>
        </footer>

    </body>
</html>
